name: CI

# CI runs on PRs and main pushes — same pre-flight gate as tag releases,
# without publishing assets.
# Tag pushes are handled by .github/workflows/release.yml (US-601~605),
# which repeats this gate before creating a GitHub Release.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Unit tests
        run: pnpm run test:unit
      - name: E2E tests
        env:
          OBSIDIAN_VERSIONS: latest/latest
        run: pnpm run test:e2e
