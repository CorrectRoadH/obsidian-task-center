name: CI

# CI runs on PRs and main pushes — verifies build/test before merge.
# Tag pushes are handled by .github/workflows/release.yml (US-601~605),
# which has its own pre-flight gate covering typecheck/lint/unit/e2e.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
